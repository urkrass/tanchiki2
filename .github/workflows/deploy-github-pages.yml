name: Deploy GitHub Pages

# Manual only. A blank preview slug deploys the production root; a slug preserves
# the current production artifact and adds an isolated build under /previews/.
on:
  workflow_dispatch:
    inputs:
      preview_slug:
        description: Optional preview slug (for example, cinematic-carousel)
        required: false
        default: ""
        type: string
      expected_source_sha:
        description: Required for production root - exact approved 40-character main SHA
        required: false
        default: ""
        type: string
      multiplayer_url:
        description: Required for production root - exact HTTPS Render service origin
        required: false
        default: ""
        type: string
      frontend_rollback_sha:
        description: Required for production root - prior successful Pages source SHA
        required: false
        default: ""
        type: string
      backend_rollback_action:
        description: Required for production root - DISABLE_INITIAL_SERVICE or ROLLBACK_TO_SOURCE:<sha>
        required: false
        default: ""
        type: string

permissions: {}

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pages: write
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Reject non-main production release
        if: ${{ inputs.preview_slug == '' && github.ref != 'refs/heads/main' }}
        run: |
          echo "::error::Production Pages deployment must run from refs/heads/main."
          exit 1

      - name: Validate online production release
        if: ${{ inputs.preview_slug == '' && github.ref == 'refs/heads/main' }}
        env:
          EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
          MULTIPLAYER_URL: ${{ inputs.multiplayer_url }}
          FRONTEND_ROLLBACK_SHA: ${{ inputs.frontend_rollback_sha }}
          BACKEND_ROLLBACK_ACTION: ${{ inputs.backend_rollback_action }}
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/validate-online-release-inputs.mjs

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6.0.0

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Select Pages artifact contents
        id: site
        env:
          PREVIEW_SLUG: ${{ inputs.preview_slug }}
        run: |
          set -euo pipefail

          if [ -z "${PREVIEW_SLUG}" ]; then
            echo "path=dist" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ ! "${PREVIEW_SLUG}" =~ ^[a-z0-9][a-z0-9-]{0,62}$ ]]; then
            echo "::error::Preview slug must contain only lowercase letters, numbers, and hyphens."
            exit 1
          fi

          echo "path=${RUNNER_TEMP}/pages-site" >> "${GITHUB_OUTPUT}"

      - name: Preserve production root and add preview
        if: ${{ inputs.preview_slug != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PREVIEW_SLUG: ${{ inputs.preview_slug }}
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          set -euo pipefail

          site_dir="${RUNNER_TEMP}/pages-site"
          archive_dir="${RUNNER_TEMP}/production-pages-artifact"
          archive_zip="${RUNNER_TEMP}/production-pages-artifact.zip"
          mkdir -p "${site_dir}" "${archive_dir}"

          runs_json="$(curl --fail --silent --show-error --location \
            --retry 3 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy-github-pages.yml/runs?branch=main&status=success&event=workflow_dispatch&per_page=20")"

          mapfile -t production_run_ids < <(
            printf '%s' "${runs_json}" |
              python3 -c 'import json, sys; [print(run["id"]) for run in json.load(sys.stdin).get("workflow_runs", [])]'
          )

          artifact_url=""
          production_run_id=""
          for run_id in "${production_run_ids[@]}"; do
            artifacts_json="$(curl --fail --silent --show-error --location \
              --retry 3 \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/artifacts")"
            candidate_url="$(
              printf '%s' "${artifacts_json}" |
                python3 -c 'import json, sys; artifacts = json.load(sys.stdin).get("artifacts", []); print(next((item["archive_download_url"] for item in artifacts if item["name"] == "github-pages" and not item["expired"]), ""))'
            )"
            if [ -n "${candidate_url}" ]; then
              artifact_url="${candidate_url}"
              production_run_id="${run_id}"
              break
            fi
          done

          if [ -z "${artifact_url}" ]; then
            echo "::error::No unexpired successful main Pages artifact is available. Production root was not changed."
            exit 1
          fi

          curl --fail --silent --show-error --location \
            --retry 3 \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${artifact_url}" \
            --output "${archive_zip}"
          unzip -q "${archive_zip}" -d "${archive_dir}"

          if [ ! -f "${archive_dir}/artifact.tar" ]; then
            echo "::error::The preserved Pages artifact did not contain artifact.tar."
            exit 1
          fi

          tar -xf "${archive_dir}/artifact.tar" -C "${site_dir}"
          preview_dir="${site_dir}/previews/${PREVIEW_SLUG}"
          if [ -e "${preview_dir}" ]; then
            echo "::error::Preview path already exists in the production artifact: previews/${PREVIEW_SLUG}"
            exit 1
          fi
          mkdir -p "${preview_dir}"
          cp -a dist/. "${preview_dir}/"

          {
            echo "### Isolated Pages preview"
            echo
            echo "- Preserved production artifact from workflow run ${production_run_id}"
            echo "- Added preview at ${PAGES_BASE_URL}/previews/${PREVIEW_SLUG}/"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload Pages artifact
        id: upload
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: ${{ steps.site.outputs.path }}
          retention-days: 90

  deploy:
    name: Deploy Pages artifact
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      actions: read
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout release guard
        uses: actions/checkout@v7.0.0

      - name: Setup Node for release guard
        uses: actions/setup-node@v6.4.0
        with:
          node-version-file: .node-version

      - name: Deploy Pages artifact
        id: deployment
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PAGES_ARTIFACT_ID: ${{ needs.build.outputs.artifact_id }}
          PAGES_BUILD_VERSION: ${{ github.sha }}
          PREVIEW_SLUG: ${{ inputs.preview_slug }}
          MULTIPLAYER_URL: ${{ inputs.multiplayer_url }}
          EXPECTED_SOURCE_SHA: ${{ inputs.expected_source_sha }}
          FRONTEND_ROLLBACK_SHA: ${{ inputs.frontend_rollback_sha }}
          BACKEND_ROLLBACK_ACTION: ${{ inputs.backend_rollback_action }}
          DEPLOY_TIMEOUT_SECONDS: 1800
          DEPLOY_POLL_SECONDS: 15
        run: |
          set -euo pipefail

          if [ -z "${PAGES_ARTIFACT_ID}" ]; then
            echo "::error::Pages artifact id was not exported by the build job."
            exit 1
          fi

          if [ -z "${PREVIEW_SLUG}" ]; then
            node scripts/validate-online-release-inputs.mjs
          fi

          oidc_json="$(curl -fsSL \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}")"
          oidc_token="$(printf '%s' "${oidc_json}" | python3 -c 'import json, sys; print(json.load(sys.stdin)["value"])')"

          payload="$(PAGES_ARTIFACT_ID="${PAGES_ARTIFACT_ID}" PAGES_BUILD_VERSION="${PAGES_BUILD_VERSION}" OIDC_TOKEN="${oidc_token}" python3 -c 'import json, os; print(json.dumps({"artifact_id": int(os.environ["PAGES_ARTIFACT_ID"]), "pages_build_version": os.environ["PAGES_BUILD_VERSION"], "oidc_token": os.environ["OIDC_TOKEN"]}))')"

          if [ -z "${PREVIEW_SLUG}" ]; then
            health_json="$(curl --fail-with-body --silent --show-error --location \
              --max-redirs 0 \
              --max-time 10 \
              --proto '=https' \
              -H "Accept: application/json" \
              "${MULTIPLAYER_URL}/health")"
            HEALTH_JSON="${health_json}" EXPECTED_SOURCE_SHA="${EXPECTED_SOURCE_SHA}" python3 - <<'PY'
          import json
          import os

          body = json.loads(os.environ["HEALTH_JSON"])
          expected_keys = {"ok", "privateRooms", "revision", "service"}
          if not isinstance(body, dict) or set(body) != expected_keys:
              raise SystemExit("PRODUCTION_BACKEND_UNHEALTHY_AT_DEPLOY unexpected health response fields")
          if body["ok"] is not True or body["service"] != "tanchiki-multiplayer":
              raise SystemExit("PRODUCTION_BACKEND_UNHEALTHY_AT_DEPLOY invalid service identity")
          if body["revision"] != os.environ["EXPECTED_SOURCE_SHA"]:
              raise SystemExit("PRODUCTION_BACKEND_REVISION_MISMATCH_AT_DEPLOY")
          if type(body["privateRooms"]) is not int or body["privateRooms"] != 0:
              raise SystemExit(f"PRODUCTION_BACKEND_NOT_DRAINED_AT_DEPLOY privateRooms={body['privateRooms']!r}")
          PY
            echo "Backend remains on the approved revision with zero active rooms immediately before Pages deployment."
          fi

          deployment_json="$(curl -fsSL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages/deployments" \
            -d "${payload}")"

          page_url="$(printf '%s' "${deployment_json}" | python3 -c 'import json, sys; print(json.load(sys.stdin).get("page_url", ""))')"
          deployment_id="$(printf '%s' "${deployment_json}" | python3 -c 'import json, sys; deployment = json.load(sys.stdin); status_url = deployment.get("status_url") or ""; print(deployment.get("id") or (status_url.rstrip("/").split("/")[-1] if status_url else ""))')"

          if [ -z "${deployment_id}" ]; then
            deployment_id="${PAGES_BUILD_VERSION}"
          fi

          if [ -z "${page_url}" ]; then
            pages_json="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages")"
            page_url="$(printf '%s' "${pages_json}" | python3 -c 'import json, sys; print(json.load(sys.stdin).get("html_url", ""))')"
          fi

          echo "page_url=${page_url}" >> "${GITHUB_OUTPUT}"
          echo "Created Pages deployment for ${PAGES_BUILD_VERSION}, ID: ${deployment_id}"

          deadline=$((SECONDS + DEPLOY_TIMEOUT_SECONDS))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            status_json="$(curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages/deployments/${deployment_id}")"
            status="$(printf '%s' "${status_json}" | python3 -c 'import json, sys; print(json.load(sys.stdin).get("status") or "")')"
            echo "Current Pages deployment status: ${status:-empty}"

            case "${status}" in
              succeed)
                echo "status=succeed" >> "${GITHUB_OUTPUT}"
                exit 0
                ;;
              deployment_failed|deployment_content_failed|deployment_cancelled|deployment_lost)
                echo "::error::Pages deployment failed with status ${status}."
                exit 1
                ;;
            esac

            sleep "${DEPLOY_POLL_SECONDS}"
          done

          echo "::error::Pages deployment did not report success before ${DEPLOY_TIMEOUT_SECONDS}s; leaving the queued deployment uncanceled for GitHub Pages backend completion."
          exit 1
