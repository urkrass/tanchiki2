name: Deploy GitHub Pages

# Manual only until a separate release-execution package authorizes dispatch.
on:
  workflow_dispatch:

permissions: {}

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6.0.0

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: dist

  deploy:
    name: Deploy Pages artifact
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5.0.0
        with:
          timeout: 1800000
