schema_version: agentic_harness.project_adapter.v1
project:
  key: "TANCHIKI"
  name: "tanchiki2"
  repository: "urkrass/tanchiki2"
  default_base_branch: "main"

harness:
  core_source: "upstream"
  upstream_repo: "urkrass/agentic-harness"
  upstream_ref: "4e1825c84650b032b23d98029772918fb1740c80"
  adapter_schema: "agentic_harness.project_adapter.v1"

issue_tracker:
  provider: "local"
  project: "tanchiki"
  labels:
    role_prefix: "role:"
    type_prefix: "type:"
    risk_prefix: "risk:"
    validation_prefix: "validation:"
    automation_ready: "automation-ready"
    stop_labels:
      - "human-review-required"
      - "blocked"

resource_locks:
  owns:
    - ".agentic-harness/**"
    - "docs/**"
    - "packages/**"
    - "src/**"
    - "public/**"
    - "qa/**"
    - "index.html"
    - "package.json"
    - "package-lock.json"
    - "progress.md"
    - "tsconfig.json"
  must_not_touch:
    - "D:/agentic-harness/repo/**"
  protected_surfaces:
    - "secrets"
    - "billing"
    - "dashboards"
    - "branch_protection"
    - "production_settings"
    - "deployments"

validation:
  automated:
    - "npm run test"
    - "npm run build"
    - "npm run harness:validate"
    - "npm run harness:smoke"
    - "npm run harness:deep-agent:stub-runtime"
  manual:
    - "Playwright gameplay screenshot and render_game_to_text inspection"

human_gates:
  required: false
  gates:
    - name: "public_release"
      trigger: "publishing a release, package, or public deployment"
      evidence: "human-owned approval comment"
    - name: "protected_surface_change"
      trigger: "repository settings, secrets, billing, dashboards, branch protection, production settings, or deployment changes"
      evidence: "human-owned approval comment"

deployment_profile:
  provider: "not_applicable"
  environments:
    - name: "local"
      deployment_required: false
      url_reference: "not_applicable"
      check_names: []
  external_settings_policy: "human_owned"

smoke_checklists:
  references:
    - ".agentic-harness/SMOKE_CHECKLIST.md"
  required_evidence:
    - "adapter validated"
    - "lockfile pin validated"
    - "resource locks checked"
    - "human gates evaluated"
    - "gameplay smoke inspected"

review:
  cadence: "paired-review"
  reviewer_route: "github_actions_reviewer_app"
  decision_schema: "agentic_harness.review_decision.v1"
  reviewer_app:
    workflow_path: ".github/workflows/reviewer-app.yml"
    workflow: "reviewer-app.yml"
    product_repository: "urkrass/tanchiki2"
    base_branch: "main"
    dry_run_evidence_path: ".agentic-harness/reviewer-app-dry-run-evidence.json"
    workflow_dispatch_inputs:
      - "pr_number"
      - "issue"
      - "verify_token"
      - "submit_review"
    trusted_harness:
      repository: "urkrass/agentic-harness"
      ref: "69df33aafbe6f2738b87419d449fd3ee4f84f018"
      resolved_commit: "69df33aafbe6f2738b87419d449fd3ee4f84f018"
      source_pr: 268
    dry_run_command: "gh workflow run reviewer-app.yml --repo urkrass/tanchiki2 --ref main -f pr_number=<PR_NUMBER> -f issue=<ISSUE_OR_PACKAGE_ID> -f verify_token=false -f submit_review=false"
    submit_review_command: "gh workflow run reviewer-app.yml --repo urkrass/tanchiki2 --ref main -f pr_number=<PR_NUMBER> -f issue=<ISSUE_OR_PACKAGE_ID> -f verify_token=true -f submit_review=true"
    authority:
      review_only: true
      submit_review_requires_input: true
      secret_values_logged: false
      deployment_or_publish_authority: false
      repository_settings_authority: false
      branch_protection_authority: false
      billing_authority: false
      game_logic_authority: false

persistent_memory:
  required: true
  root: ".agentic-harness/memory"
  paths:
    project_memory: ".agentic-harness/memory/project-memory.json"
    role_memory: ".agentic-harness/memory/role-memory.json"
    review_debt: ".agentic-harness/memory/review-debt.json"
    validation_memory: ".agentic-harness/memory/validation-memory.json"
    closeout_memory: ".agentic-harness/memory/closeout-memory.json"
  records:
    - kind: "project_memory"
      path: ".agentic-harness/memory/project-memory.json"
      required: true
    - kind: "role_memory"
      path: ".agentic-harness/memory/role-memory.json"
      required: true
    - kind: "review_debt"
      path: ".agentic-harness/memory/review-debt.json"
      required: true
    - kind: "validation_memory"
      path: ".agentic-harness/memory/validation-memory.json"
      required: true
    - kind: "closeout_memory"
      path: ".agentic-harness/memory/closeout-memory.json"
      required: true
  memory_ledger_path: ".agentic-harness/memory-ledger.json"
  review_warden_gate_path: ".agentic-harness/review-warden-gate.json"
  review_debt_check:
    wrapper_command: "review"
    command: "npm.cmd run harness:review-warden:product-repo -- --input .agentic-harness/review-warden-gate.json --check --compact --stdout"
    blocks_complete: true
    green_validation_requires_scan: true
  authority:
    memory_is_authority: false
    git_artifacts_remain_authority: true
    memory_grants_merge_authority: false
    memory_grants_review_authority: false
    memory_grants_validation_authority: false

credentials:
  policy: "managed outside repository"
  references: []

rollback:
  local_core_available: true
  fallback_command: "node ./.agentic-harness/harness-wrapper.mjs validate"

extensions:
  development_packages: "docs/development-packages.md"
  game_runtime: "Canvas 2D + TypeScript + Vite"
  deep_agents_stub_runtime:
    runtime_profile: ".agentic-harness/deep-agents/runtime-profile.json"
    polish_planning_scenario: ".agentic-harness/deep-agents/scenarios/polish-planning.json"
    output: ".agentic-harness/deep-agents/outputs/polish-plan-v1.json"
    plan_doc: "docs/planning/tanchiki2-polish-plan-v1.md"
    run_command: "npm.cmd run harness:deep-agent:stub-runtime"
    pinned_harness_commit: "4e1825c84650b032b23d98029772918fb1740c80"
