services:
  toxiproxy:
    image: ghcr.io/shopify/toxiproxy:2.12.0
    command: ["-host", "0.0.0.0", "-config", "/config/toxiproxy.json"]
    volumes:
      - ./toxiproxy.json:/config/toxiproxy.json:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "18474:8474"
      - "18788:8788"
      - "18789:8789"
      - "18790:8790"
      - "18791:8791"
